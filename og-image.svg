<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&amp;family=Space+Mono&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#FBF6EC"/>

  <!-- Soft blobs -->
  <ellipse cx="980" cy="120" rx="320" ry="260" fill="#FF5B3C" opacity="0.08"/>
  <ellipse cx="200" cy="520" rx="280" ry="220" fill="#7A9E7E" opacity="0.1"/>

  <!-- Grain texture overlay (SVG filter) -->
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
    <feComposite in="blend" in2="SourceGraphic" operator="in"/>
  </filter>
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.04"/>

  <!-- Wordmark -->
  <text x="80" y="220" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="148" fill="#1A1A1A" letter-spacing="-4">pawd</text>
  <circle cx="513" cy="180" r="14" fill="#FF5B3C"/>

  <!-- Tagline -->
  <text x="82" y="295" font-family="'Courier New', Courier, monospace" font-size="18" fill="#1A1A1A" opacity="0.45" letter-spacing="3">PERSONALITY-FIRST PET ADOPTION</text>

  <!-- Divider -->
  <line x1="82" y1="330" x2="400" y2="330" stroke="#1A1A1A" stroke-width="1.5" opacity="0.15"/>

  <!-- Sub copy -->
  <text x="82" y="380" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="#1A1A1A" opacity="0.7">swipe · match · support your shelter.</text>

  <!-- Pills -->
  <rect x="82" y="420" width="180" height="44" rx="22" fill="#1A1A1A"/>
  <text x="172" y="447" font-family="'Courier New', Courier, monospace" font-size="13" fill="#FBF6EC" text-anchor="middle" letter-spacing="1">coming to iOS 2026</text>

  <rect x="278" y="420" width="148" height="44" rx="22" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.3"/>
  <text x="352" y="447" font-family="'Courier New', Courier, monospace" font-size="13" fill="#1A1A1A" text-anchor="middle" letter-spacing="1">usepawd.com</text>

  <!-- Right side — color swatches as type legend -->
  <rect x="820" y="240" width="300" height="64" rx="18" fill="#eaf2ea"/>
  <circle cx="850" cy="272" r="10" fill="#7A9E7E"/>
  <text x="872" y="278" font-family="'Courier New', Courier, monospace" font-size="15" fill="#3D6B41">67 shelters nationwide</text>

  <rect x="820" y="316" width="300" height="64" rx="18" fill="#fdeeed"/>
  <circle cx="850" cy="348" r="10" fill="#FF5B3C"/>
  <text x="872" y="354" font-family="'Courier New', Courier, monospace" font-size="15" fill="#C04A2D">$0.25 per swipe-down</text>

  <rect x="820" y="392" width="300" height="64" rx="18" fill="#eeebf8"/>
  <circle cx="850" cy="424" r="10" fill="#8B6FD4"/>
  <text x="872" y="430" font-family="'Courier New', Courier, monospace" font-size="15" fill="#6248AA">100% to the shelter</text>

  <!-- URL bottom right -->
  <text x="1140" y="590" font-family="'Courier New', Courier, monospace" font-size="14" fill="#1A1A1A" opacity="0.35" text-anchor="end" letter-spacing="1">USEPAWD.COM</text>
</svg>
